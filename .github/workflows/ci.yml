name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.x"
          enable-cache: true

      - name: Setup Python 3.11
        run: uv python install 3.11

      - name: Sync deps
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check app tests

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Tests (pytest, sin live)
        run: uv run pytest -q
