services:
  # API web (FastAPI). Free tier: duerme tras ~15 min idle.
  # Render free no soporta `type: cron`. El sync periódico se hace via
  # GitHub Actions (.github/workflows/scrape.yml) llamando a /admin/scrape.
  - type: web
    name: interinos-backend
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
      # In-process scheduler apagado: el web service free duerme tras
      # 15 min idle. El cron real lo dispara GitHub Actions.
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: SIPRI_BASE_URL
        value: https://sipri.juntadeandalucia.es
      - key: NOMINATIM_BASE_URL
        value: https://nominatim.openstreetmap.org
      - key: OSRM_BASE_URL
        value: https://router.project-osrm.org
      - key: USER_AGENT
        value: InterinosBot/1.0 (+https://github.com/gcinc91/interinos-backend)
      - key: LOG_LEVEL
        value: INFO
